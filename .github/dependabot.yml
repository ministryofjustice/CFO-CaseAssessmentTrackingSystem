version: 2

updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "daily"
      time: "04:00"
    cooldown:
      default-days: 7

    target-branch: "develop"

    commit-message:
      prefix: "deps"

    open-pull-requests-limit: 1

    ignore:
      - dependency-name: "AutoMapper"
      - dependency-name: "AutoMapper.*"
      - dependency-name: "MediatR"
      - dependency-name: "MediatR.*"

    groups:
      all-dependencies:
        patterns:
          - "*"