name: deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  ecr:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # This is required for requesting the JWT
      contents: read # This is required for actions/checkout
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.ECR_REGION }}
      
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
        id: login-ecr

      - name: Build and Push Server.UI Container
        run: |
          dotnet publish src/Server.UI/Server.UI.csproj \
            --configuration Release \
            --no-build \
            /t:PublishContainer \
            /p:ContainerRegistry=${{ steps.login-ecr.outputs.registry }} \
            /p:ContainerRepository=${{ vars.ECR_REPOSITORY }} \
            /p:ContainerImageTag=cats-${{ github.sha }}
      
      - name: Build and Push DatabaseMigrator Container
        run: |
          dotnet publish src/DatabaseMigrator/DatabaseMigrator.csproj \
            --configuration Release \
            --no-build \
            /t:PublishContainer \
            /p:ContainerRegistry=${{ steps.login-ecr.outputs.registry }} \
            /p:ContainerRepository=${{ vars.ECR_REPOSITORY }} \
            /p:ContainerImageTag=migrator-${{ github.sha }}
      
      - name: Generate Kubernetes Manifests
        run: |
          mkdir -p deploy
          for file in infra/*.yml; do
            envsubst < "$file" > "deploy/$(basename "$file")"
          done
        env:
          IMAGE_TAG: ${{ github.sha }}
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
          DOTNET_ENVIRONMENT: "Development"
      
      - name: Deploy to Kubernetes
        run: |
          echo "${{ secrets.KUBE_CERT }}" > ca.crt
          kubectl config set-cluster ${KUBE_CLUSTER} --certificate-authority=./ca.crt --server=https://${KUBE_CLUSTER}
          kubectl config set-credentials deploy-user --token=${{ secrets.KUBE_TOKEN }}
          kubectl config set-context ${KUBE_CLUSTER} --cluster=${KUBE_CLUSTER} --user=deploy-user --namespace=${KUBE_NAMESPACE}
          kubectl config use-context ${KUBE_CLUSTER}
          kubectl -n ${KUBE_NAMESPACE} apply -f deploy/
        env:
          KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
          KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}