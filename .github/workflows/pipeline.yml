name: Pipeline [test -> build -> deploy]

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  # Only cancel in-progress runs on a branch; use the SHA on main so concurrent
  # main pipelines get unique groups (a namespace can only hold one helm lock).
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.sha || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Lint the chart against every environment's values on every push, so config
  # drift is caught even before preprod/prod namespaces exist.
  helm_lint:
    strategy:
      matrix:
        environments: ['dev', 'preprod', 'prod']
    name: helm lint
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/test_helm_lint.yml@v2 # WORKFLOW_VERSION
    secrets: inherit
    with:
      environment: ${{ matrix.environments }}
      chart_name: cats

  # Build + unit-test the .NET solution. There is no shared HMPPS reusable workflow
  # for .NET, so this is a bespoke job. It builds from source (the Dockerfile is
  # multi-stage), so no build artifacts are uploaded for the docker build.
  dotnet_verify:
    name: Build & test (.NET)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
        with:
          global-json-file: global.json
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --configuration Release --no-restore
      - name: Verify database migrator (file-based app)
        # Not part of the solution, so build it explicitly to keep it compile-checked in CI.
        run: dotnet build scripts/migrate-database.cs --configuration Release
      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

  build_app:
    name: Build docker image (UI + Worker + Seeder + Migrator) from hmpps-github-actions
    if: github.ref == 'refs/heads/main'
    needs: [dotnet_verify]
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/docker_build.yml@v2 # WORKFLOW_VERSION
    with:
      docker_registry: 'ghcr.io'
      registry_org: 'ministryofjustice'
      image_name: 'hmpps-cfo-cats'
      file: 'Dockerfile'
      tag_latest: false # immutable, version-only tags (no rolling :latest)
      push: true
      docker_multiplatform: false
      download_build_artifacts: false
      generate_sbom: true
      attach_sbom_to_registry: true
      sign_image: true

  deploy_dev:
    name: Deploy to the development environment
    needs: [build_app, helm_lint]
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/deploy_env.yml@v2 # WORKFLOW_VERSION
    secrets: inherit
    with:
      environment: 'dev'
      app_version: '${{ needs.build_app.outputs.app_version }}'
      helm_chart_name: 'cats'
      k8s_deployment_name: 'cats'
      slack_notification: 'false' # set 'true' once NONPROD_RELEASES_SLACK_CHANNEL is configured
      helm_additional_args: >-
        --set generic-service.env.Sentry__Release=${{ needs.build_app.outputs.app_version }}
        --set generic-service.env.AppConfigurationSettings__Version=${{ needs.build_app.outputs.app_version }}

  # deploy_preprod:
  #   name: Deploy to the pre-production environment
  #   needs: [build_app, deploy_dev]
  #   uses: ministryofjustice/hmpps-github-actions/.github/workflows/deploy_env.yml@v2 # WORKFLOW_VERSION
  #   secrets: inherit
  #   with:
  #     environment: 'preprod'
  #     app_version: '${{ needs.build_app.outputs.app_version }}'
  #     helm_chart_name: 'cats'
  #     k8s_deployment_name: 'cats'
  #     slack_notification: 'false'
  #     helm_additional_args: >-
  #       --set generic-service.env.Sentry__Release=${{ needs.build_app.outputs.app_version }}
  #       --set generic-service.env.AppConfigurationSettings__Version=${{ needs.build_app.outputs.app_version }}

