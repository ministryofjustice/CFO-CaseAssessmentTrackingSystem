name: Request or Problem
description: Tell us about something that isn't working, could be improved, or is missing
title: ""
body:
  - type: markdown
    attributes:
      value: |
        ## Important

        **Do not include personal, sensitive, classified, or confidential information in this request.**

        This includes:
        - Names of offenders, staff, victims, witnesses, or members of the public
        - Prison numbers, case references, addresses, dates of birth, or other identifying information
        - Screenshots containing personal or sensitive data
        - Information marked Official-Sensitive or subject to access restrictions

        If you need to refer to an individual or case, please contact the CFO Service Desk directly.

  - type: textarea
    id: request
    attributes:
      label: What is the issue or request?
      description: Describe what happened or what you would like to achieve.
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Why is this important?
      description: Explain how this affects your work or users.
    validations:
      required: true

  - type: textarea
    id: outcome
    attributes:
      label: What would a good outcome look like?
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional information
      description: Screenshots, examples, case references, etc.

  - type: checkboxes
    id: data-protection
    attributes:
      label: Data Protection Confirmation
      options:
        - label: I confirm that this discussion does not contain personal, sensitive, classified, or confidential information and that any screenshots or examples have been anonymised.
          required: true