title: ''
labels:
  - discussion
body:
  - type: markdown
    attributes:
      value: >
        ## Important


        **Do not include personal, sensitive, classified, or confidential
        information in this discussion.**


        This includes:

        - Names of prisoners, staff, victims, witnesses, or members of the
        public

        - Prison numbers, case references, addresses, dates of birth, or other
        identifying information

        - Screenshots containing personal or sensitive data

        - Information marked Official-Sensitive or subject to access
        restrictions


        Please use anonymised or fictional examples wherever possible.
  - type: textarea
    id: topic
    attributes:
      label: What would you like to discuss?
      description: 'Describe your idea, question, feedback, or concern.'
      placeholder: Explain the topic and any background information.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem or opportunity does this relate to?
      description: Tell us why this discussion is important.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: What outcome would you like from this discussion?
      description: >-
        For example, a decision, feedback, clarification, or agreement on next
        steps.
  - type: textarea
    id: additional
    attributes:
      label: Additional information
      description: 'Include any examples, links, or supporting information that may help.'
  - type: checkboxes
    id: data-protection
    attributes:
      label: Data Protection Confirmation
      options:
        - label: >-
            I confirm that this discussion does not contain personal, sensitive,
            classified, or confidential information and that any screenshots or
            examples have been anonymised.
          required: true
