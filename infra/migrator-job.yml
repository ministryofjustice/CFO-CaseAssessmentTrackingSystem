apiVersion: batch/v1
kind: Job
metadata:
  name: migrator-job
  labels:
    app: migrator
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: migrator
    spec:
      serviceAccountName: ${NAMESPACE}
      restartPolicy: Never
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        runAsUser: 1001
        runAsGroup: 1001
        runAsNonRoot: true
      containers:
        - name: migrator
          image: ${REGISTRY}/${REPOSITORY}:migrator-${IMAGE_TAG}
          command:
            - sh
            - -c
            - |
              set -e
              echo "Deploying schema via sqlpackage..."
              sqlpackage /Action:Publish \
                /SourceFile:/app/CatsDb.dacpac \
                /TargetConnectionString:"$ConnectionStrings__CatsDb" \
                /p:BlockOnPossibleDataLoss=false
              echo "Schema deployed successfully."
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
          env:
            - name: DATABASE_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: rds-mssql-instance-output
                  key: rds_instance_address
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: rds-mssql-instance-output
                  key: database_username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rds-mssql-instance-output
                  key: database_password
            - name: ConnectionStrings__CatsDb
              value: "Server=$(DATABASE_ADDRESS);Database=CatsDb;User Id=$(DATABASE_USERNAME);Password=$(DATABASE_PASSWORD);TrustServerCertificate=True;"
