# Development overrides. Namespace: hmpps-cfo-case-assessment-tracking-system-dev

# The IRSA-annotated service account (name == namespace) used by all workloads and hooks.
serviceAccountName: hmpps-cfo-case-assessment-tracking-system-dev

app:
  serviceAccountName: hmpps-cfo-case-assessment-tracking-system-dev
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
    scaleUpStabilizationWindowSeconds: 60
  ingress:
    host: hmpps-cfo-case-assessment-tracking-system-dev.live.cloud-platform.service.justice.gov.uk
  resources:
    requests:
      cpu: 300m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  env:
    DOTNET_ENVIRONMENT: "Development"
    Sentry__Environment: "Development-CloudPlatform"
    # Fully-qualified in-cluster DNS (<service>.<namespace>.svc.cluster.local)
    # so this matches NO_PROXY and bypasses the egress-controls Envoy proxy.
    WorkerOptions__BaseUrl: "http://cats-worker.hmpps-cfo-case-assessment-tracking-system-dev.svc.cluster.local:8080"

worker:
  serviceAccountName: hmpps-cfo-case-assessment-tracking-system-dev
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    DOTNET_ENVIRONMENT: "Development"
    Sentry__Environment: "Development-CloudPlatform"

# RDS bridge - disabled in non-development environments
rdsPortForward:
  enabled: true

# Redis bridge - disabled in non-development environments
redisPortForward:
  enabled: true

generic-prometheus-alerts:
  alertSeverity: <to-be-determined>
  rdsAlertsDatabases:
    hmpps-cfo-case-assessment-tracking-system-db-development: "CATS dev SQL Server"
  elastiCacheAlertsClusterIds:
    cp-20b02f1c5ace00c5-001: "CATS dev Redis (primary)"
    cp-20b02f1c5ace00c5-002: "CATS dev Redis (replica)"
