serviceAccountName: hmpps-cfo-case-assessment-tracking-system-dev

generic-service:
  serviceAccountName: hmpps-cfo-case-assessment-tracking-system-dev
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
    scaleUpStabilizationWindowSeconds: 60
  ingress:
    host: hmpps-cfo-case-assessment-tracking-system-dev.live.cloud-platform.service.justice.gov.uk
  resources:
    requests:
      cpu: 300m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  env:
    DOTNET_ENVIRONMENT: "Development"
    Sentry__Environment: "Development-CloudPlatform"
    # Fully-qualified in-cluster DNS (<service>.<namespace>.svc.cluster.local)
    # so this matches NO_PROXY and bypasses the egress-controls Envoy proxy.
    WorkerOptions__BaseUrl: "http://cats-worker.hmpps-cfo-case-assessment-tracking-system-dev.svc.cluster.local:8080"

worker:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    DOTNET_ENVIRONMENT: "Development"
    Sentry__Environment: "Development-CloudPlatform"

# RDS bridge - disabled in non-development environments
rdsPortForward:
  enabled: true

# Redis bridge - disabled in non-development environments
redisPortForward:
  enabled: true

