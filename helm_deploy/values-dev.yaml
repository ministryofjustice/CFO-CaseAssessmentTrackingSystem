# Development overrides. Namespace: hmpps-cfo-case-assessment-tracking-system-dev

# The IRSA-annotated service account (name == namespace) used by all workloads and hooks.
serviceAccountName: hmpps-cfo-case-assessment-tracking-system-dev

app:
  serviceAccountName: hmpps-cfo-case-assessment-tracking-system-dev
  replicaCount: 3
  ingress:
    host: hmpps-cfo-case-assessment-tracking-system-dev.live.cloud-platform.service.justice.gov.uk
  env:
    DOTNET_ENVIRONMENT: "Development"
    Sentry__Environment: "Development-CloudPlatform"

worker:
  serviceAccountName: hmpps-cfo-case-assessment-tracking-system-dev
  replicaCount: 1
  env:
    DOTNET_ENVIRONMENT: "Development"
    Sentry__Environment: "Development-CloudPlatform"

# RDS bridge - disabled in non-development environments
rdsPortForward:
  enabled: true

