{{- if eq .Values.job "migrate" }}
apiVersion: batch/v1
kind: Job
metadata:
  # Revision-suffixed so each upgrade of the cats-migrate release runs a fresh Job
  # (a Job's pod template is immutable, so a stable name could not be re-applied).
  name: cats-migrator-{{ .Release.Revision }}
  labels:
    app: migrator
spec:
  backoffLimit: {{ .Values.migrator.backoffLimit }}
  # Auto-clean finished Jobs; Helm also prunes the previous revision's Job on upgrade.
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: migrator
    spec:
      serviceAccountName: {{ .Values.serviceAccountName }}
      restartPolicy: Never
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        runAsUser: 1001
        runAsGroup: 1001
        runAsNonRoot: true
      containers:
        - name: migrator
          image: "{{ .Values.migrator.image.repository }}:{{ .Values.migrator.image.tag }}"
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            capabilities:
              drop:
                - ALL
          env:
            {{- include "cats.databaseEnv" . | nindent 12 }}
{{- end }}
