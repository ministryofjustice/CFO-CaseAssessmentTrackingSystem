{{- if .Values.seeder.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: cats-seeder
  labels:
    app: seeder
  annotations:
    # Runs after the migrator (higher hook-weight) and before the application upgrade.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.seeder.backoffLimit }}
  template:
    metadata:
      labels:
        app: seeder
    spec:
      serviceAccountName: {{ include "cats.serviceAccountName" . }}
      restartPolicy: Never
      securityContext:
        {{- include "cats.podSecurityContext" . | nindent 8 }}
      containers:
        - name: seeder
          image: "{{ .Values.seeder.image.repository }}:{{ .Values.seeder.image.tag }}"
          securityContext:
            {{- include "cats.containerSecurityContext" . | nindent 12 }}
          env:
            {{- include "cats.databaseEnv" . | nindent 12 }}
            - name: DOTNET_ENVIRONMENT
              value: {{ .Values.dotnetEnvironment | quote }}
          {{- with .Values.seeder.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
