apiVersion: apps/v1
kind: Deployment
metadata:
  name: cats-worker
  labels:
    app: cats-worker
spec:
  replicas: 1
  revisionHistoryLimit: 2
  minReadySeconds: 10
  # Recreate avoids two Quartz schedulers running against the same jobstore during a rollout.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: cats-worker
  template:
    metadata:
      labels:
        app: cats-worker
    spec:
      serviceAccountName: {{ .Values.serviceAccountName }}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        runAsNonRoot: true
      containers:
        - name: cats-worker
          # Combined image (Dockerfile) with a command override to run the Worker.
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag | default .Chart.AppVersion }}"
          command: ["dotnet", "/app/worker/Cfo.Cats.Worker.dll", "--contentRoot", "/app/worker"]
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          startupProbe:
            httpGet:
              path: /alive
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /alive
              port: http
            periodSeconds: 20
            failureThreshold: 3
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          env:
            {{- include "cats.databaseEnv" . | nindent 12 }}
            {{- include "cats.namespaceSecretsEnv" .Values.worker.namespace_secrets | nindent 12 }}
            - name: Sentry__Release
              value: {{ .Chart.AppVersion | quote }}
            - name: AppConfigurationSettings__Version
              value: {{ .Chart.AppVersion | quote }}
            {{- range $key, $val := .Values.worker.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: cats-worker
  labels:
    app: cats-worker
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: cats-worker
