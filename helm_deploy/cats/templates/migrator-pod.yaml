{{- if .Values.migrator.enabled }}
apiVersion: v1
kind: Pod
metadata:
  # Revision-suffixed so each upgrade of the cats-migrate release runs a fresh Pod
  # (a Pod spec is immutable, so a stable name could not be re-applied). Helm prunes
  # the previous revision's Pod on upgrade.
  name: cats-migrator-{{ .Release.Revision }}
  labels:
    app: migrator
spec:
  serviceAccountName: {{ .Values.serviceAccountName }}
  restartPolicy: OnFailure
  securityContext:
    seccompProfile:
      type: RuntimeDefault
    runAsUser: 1001
    runAsGroup: 1001
    runAsNonRoot: true
  containers:
    - name: migrator
      image: "{{ .Values.migrator.image.repository }}:{{ .Values.migrator.image.tag }}"
      securityContext:
        allowPrivilegeEscalation: false
        privileged: false
        capabilities:
          drop:
            - ALL
      env:
        {{- include "cats.databaseEnv" . | nindent 8 }}
{{- end }}
