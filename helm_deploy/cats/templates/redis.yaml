{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deployment
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      securityContext:
        {{- include "cats.podSecurityContext" . | nindent 8 }}
      serviceAccountName: {{ include "cats.serviceAccountName" . }}
      containers:
        - name: redis
          image: {{ .Values.redis.image | quote }}
          imagePullPolicy: Always
          # Used only as a SignalR backplane and Fusion cache, so all data is ephemeral
          # and rebuildable. Disable RDB/AOF persistence to avoid the MISCONF
          # "stop-writes-on-bgsave-error" failure when /data is not writable.
          args:
            - --save
            - ""
            - --appendonly
            - "no"
          ports:
            - containerPort: 6379
          securityContext:
            {{- include "cats.containerSecurityContext" . | nindent 12 }}
          startupProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 5
            failureThreshold: 20
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          {{- with .Values.redis.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  labels:
    app: redis
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
{{- end }}
