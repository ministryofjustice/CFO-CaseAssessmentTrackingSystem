apiVersion: v2
name: cats
description: |
  Case Assessment and Tracking System (CATS) — HMPPS Creating Future Opportunities (CFO).
  A single release deploying the Blazor Server web tier and the Quartz worker (both via the
  HMPPS generic-service chart), the ephemeral in-cluster RabbitMQ and Redis dependencies,
  and the database migrator/seeder as pre-upgrade Helm hook Jobs.
type: application

# Version of this chart. Bump on every change to the chart/values.
version: "0.1.0"

# Mirrors the application version; the running image is selected via image tags at deploy time.
appVersion: "0.1.0"

dependencies:
  # Web tier (Blazor Server UI) — ingress, SignalR sticky sessions, multiple replicas.
  - name: generic-service
    alias: app
    version: "3.17.2"
    repository: https://ministryofjustice.github.io/hmpps-helm-charts

  # Background worker (Quartz jobs) — single instance, no ingress.
  - name: generic-service
    alias: worker
    version: "3.17.2"
    repository: https://ministryofjustice.github.io/hmpps-helm-charts

  # Standard HMPPS Prometheus alert rules.
  - name: generic-prometheus-alerts
    version: "1.17.1"
    repository: https://ministryofjustice.github.io/hmpps-helm-charts
