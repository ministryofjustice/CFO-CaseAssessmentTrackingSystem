apiVersion: v2
name: cats
description: |
  Case Assessment and Tracking System (CATS) — HMPPS Creating Future Opportunities (CFO).
  Deploys the Blazor Server web tier and the Quartz worker (both via the HMPPS
  generic-service chart) and the ephemeral in-cluster RabbitMQ and Redis dependencies.
  The same chart also provides the database migrator and seeder Jobs, which the CI
  pipeline installs as their own short-lived releases (cats-migrate, cats-seed) before
  the application release.
type: application

# Version of this chart. Bump on every change to the chart/values.
version: "0.1.0"

# Mirrors the application version; the running image is selected via image tags at deploy time.
appVersion: "0.1.0"

dependencies:
  # Web tier (Blazor Server UI) — ingress, SignalR sticky sessions, multiple replicas.
  - name: generic-service
    alias: app
    version: "3.17.2"
    repository: https://ministryofjustice.github.io/hmpps-helm-charts
    condition: application.enabled

  # Background worker (Quartz jobs) — single instance, no ingress.
  - name: generic-service
    alias: worker
    version: "3.17.2"
    repository: https://ministryofjustice.github.io/hmpps-helm-charts
    condition: application.enabled

  # Standard HMPPS Prometheus alert rules. Disabled by default — enable once an
  # Alertmanager receiver exists for the alertSeverity (see helm_deploy/README.md).
  - name: generic-prometheus-alerts
    version: "1.17.1"
    repository: https://ministryofjustice.github.io/hmpps-helm-charts
    condition: generic-prometheus-alerts.enabled
