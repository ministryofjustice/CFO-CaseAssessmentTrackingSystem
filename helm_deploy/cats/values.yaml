serviceAccountName: ""

# ---------------------------------------------------------------------------
# Component toggles — every workload is off by default and each release opts in
# via --set (see README). The shared values-<env>.yaml files are used by all
# three releases, so enabling happens per release in CI, not in those files:
#   app deploy : --set app.enabled=true worker.enabled=true rabbitmq.enabled=true
#   migrate    : --set migrator.enabled=true
#   seed       : --set seeder.enabled=true
# ---------------------------------------------------------------------------

connectionStrings:
  catsDb: &catsDb "Server=$(DATABASE_ADDRESS);Database=CatsDb;User Id=$(DATABASE_USERNAME);Password=$(DATABASE_PASSWORD);TrustServerCertificate=False;Encrypt=True;"
  rabbit: &rabbit "amqp://$(RABBIT_USER):$(RABBIT_PASS)@rabbitmq-service:5672"
  # Managed ElastiCache (Redis) — in-transit encryption is enabled because an auth token is
  # issued, so TLS (ssl=True) is required. Endpoint/token come from the elasticache-redis-instance-output secret.
  redis: &redis "$(REDIS_PRIMARY_ENDPOINT):6379,password=$(REDIS_AUTH_TOKEN),ssl=True,abortConnect=False"

app:
  enabled: true
  nameOverride: cats
  fullnameOverride: cats

  replicaCount: 3

  image:
    repository: ghcr.io/ministryofjustice/hmpps-cfo-cats
    tag: ""  # set at deploy time via helm_additional_args (app.image.tag)
    pullPolicy: IfNotPresent
    port: 8080

  service:
    enabled: true
    type: ClusterIP
    port: 8080

  # Exposes the OpenTelemetry Prometheus exporter's /metrics endpoint (added via
  # Cats.ServiceDefaults) to the Cloud Platform Prometheus. This creates a ServiceMonitor and a
  # NetworkPolicy that allows scraping only from the "monitoring" namespace.
  custommetrics:
    enabled: true
    scrapeInterval: 15s
    metricsPath: /metrics
    metricsPort: http

  ingress:
    enabled: true
    path: /
    healthPath: /health
    tlsSecretName: ""
    # ModSecurity WAF. Default class is the non-prod controller; production overrides to "modsec".
    className: modsec-non-prod
    modsecurity_enabled: true
    modsecurity_audit_enabled: false
    modsecurity_github_team: "hmpps-creating-future-opportunities-devs"
    annotations:
      nginx.ingress.kubernetes.io/affinity: "cookie"
      nginx.ingress.kubernetes.io/affinity-mode: "persistent"
      nginx.ingress.kubernetes.io/session-cookie-name: "http-cookie"
      nginx.ingress.kubernetes.io/session-cookie-expires: "172800"
      nginx.ingress.kubernetes.io/session-cookie-max-age: "172800"
      nginx.ingress.kubernetes.io/session-cookie-change-on-failure: "true"
      # The ingress path is "/", which would otherwise expose /metrics (Prometheus scrape
      # endpoint, see app.custommetrics) to the public internet.
      nginx.ingress.kubernetes.io/server-snippet: |
        location = /metrics {
          deny all;
          return 404;
        }

  startupProbe:
    httpGet:
      path: /alive
      port: http
    failureThreshold: 30
    periodSeconds: 5
  readinessProbe:
    httpGet:
      path: /health
      port: http
    periodSeconds: 10
    failureThreshold: 3
  livenessProbe:
    httpGet:
      path: /alive
      port: http
    periodSeconds: 20
    failureThreshold: 3

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  poddisruptionbudget:
    enabled: true
    minAvailable: 1

  namespace_secrets:
    rds-mssql-instance-output:
      DATABASE_ADDRESS: "rds_instance_address"
      DATABASE_USERNAME: "database_username"
      DATABASE_PASSWORD: "database_password"
    elasticache-redis-instance-output:
      REDIS_PRIMARY_ENDPOINT: "primary_endpoint_address"
      REDIS_AUTH_TOKEN: "auth_token"
    s3-bucket-output:
      AWS__Bucket: "bucket_name"
    config:
      RABBIT_USER: "RABBIT_USER"
      RABBIT_PASS: "RABBIT_PASS"
      Sentry__Dsn: "SentryDsn"
      Ordnance__Places__ApiKey: "OrdnanceApiKey"
      Notify__ApiKey: "NotifyApiKey"
    hmpps-envoy-https-proxy-env:
      HTTPS_PROXY: "HTTPS_PROXY"
      HTTP_PROXY: "HTTP_PROXY"
      NO_PROXY: "NO_PROXY"

  env:
    ConnectionStrings__CatsDb: *catsDb
    ConnectionStrings__rabbit: *rabbit
    ConnectionStrings__redis: *redis
    AWS__RootFolder: "Files"
    Features__UseWorkerForJobs: "true"
    Features__PresenceHub__Enabled: "true"
    Features__PresenceHub__RelayUserPresenceNotifications: "true"
    Features__UseSignalRBackplane: "true"
    Features__DmsHardLinkApiEnabled: "true"
    Features__EnablePrometheusScrapingEndpoint: "true"
    WorkerOptions__BaseUrl: "http://cats-worker:8080"
    Sentry__Release: "0.0.0"                    # overridden by CI
    AppConfigurationSettings__Version: "0.0.0"  # overridden by CI

# ---------------------------------------------------------------------------
# Background worker
# ---------------------------------------------------------------------------
worker:
  enabled: true
  nameOverride: cats-worker
  fullnameOverride: cats-worker

  replicaCount: 1

  autoscaling:
    enabled: false

  strategy:
    type: Recreate
    rollingUpdate: null

  image:
    repository: ghcr.io/ministryofjustice/hmpps-cfo-cats
    tag: ""  # set at deploy time via helm_additional_args (worker.image.tag)
    pullPolicy: IfNotPresent
    port: 8080

  # The combined image defaults to the UI; override the entrypoint to run the Worker.
  containerCommand: ["dotnet", "/app/worker/Cfo.Cats.Worker.dll", "--contentRoot", "/app/worker"]

  service:
    enabled: true
    type: ClusterIP
    port: 8080

  # todo: enable prometheus metrics for the worker
  # custommetrics:
  #   enabled: true
  #   scrapeInterval: 15s
  #   metricsPath: /metrics
  #   metricsPort: http

  ingress:
    enabled: false

  poddisruptionbudget:
    enabled: false

  startupProbe:
    httpGet:
      path: /alive
      port: http
    failureThreshold: 30
    periodSeconds: 5
  readinessProbe:
    httpGet:
      path: /health
      port: http
    periodSeconds: 10
    failureThreshold: 3
  livenessProbe:
    httpGet:
      path: /alive
      port: http
    periodSeconds: 20
    failureThreshold: 3

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  namespace_secrets:
    rds-mssql-instance-output:
      DATABASE_ADDRESS: "rds_instance_address"
      DATABASE_USERNAME: "database_username"
      DATABASE_PASSWORD: "database_password"
    config:
      RABBIT_USER: "RABBIT_USER"
      RABBIT_PASS: "RABBIT_PASS"
      Sentry__Dsn: "SentryDsn"
    hmpps-envoy-https-proxy-env:
      HTTPS_PROXY: "HTTPS_PROXY"
      HTTP_PROXY: "HTTP_PROXY"
      NO_PROXY: "NO_PROXY"

  env:
    ConnectionStrings__CatsDb: *catsDb
    ConnectionStrings__rabbit: *rabbit
    Sentry__Release: "0.0.0"
    AppConfigurationSettings__Version: "0.0.0"

rabbitmq:
  enabled: true
  image: "rabbitmq:4.3-management-alpine@sha256:9a101aaeaa9cd18d190529714cdf5722b7b60f8e27f2d4148b8c7340c35437d1"

migrator:
  enabled: true
  image:
    repository: ghcr.io/ministryofjustice/hmpps-cfo-cats  # combined image; runs the migrate-database file-based app
    tag: ""  # defaults to the chart appVersion (set by the shared deploy)

seeder:
  enabled: true  # runs in all environments (like the migrator)
  image:
    repository: ghcr.io/ministryofjustice/hmpps-cfo-cats
    tag: ""  # defaults to the chart appVersion (set by the shared deploy)

# ---------------------------------------------------------------------------
# RDS port-forward — an ad-hoc helper Deployment that bridges to the cloud RDS
# SQL Server so it can be reached via `kubectl port-forward`. Off in 
# non-development environments.
# ---------------------------------------------------------------------------
rdsPortForward:
  enabled: false
  image: "ministryofjustice/port-forward@sha256:eaed873978acf6ccf23f08315f56ef71f0a7ffcd6a0bea821459bfb363b65e76"
  localPort: 11433   # port the pod listens on (your LOCAL_PORT)
  remotePort: 1433   # SQL Server port in the cloud

# ---------------------------------------------------------------------------
# Redis port-forward — an ad-hoc helper Deployment that bridges to the cloud
# ElastiCache (Redis) so it can be reached via `kubectl port-forward`. Off in
# non-development environments.
# ---------------------------------------------------------------------------
redisPortForward:
  enabled: false
  image: "ministryofjustice/port-forward@sha256:eaed873978acf6ccf23f08315f56ef71f0a7ffcd6a0bea821459bfb363b65e76"
  localPort: 16379   # port the pod listens on (your LOCAL_PORT)
  remotePort: 6379   # Redis port in the cloud

