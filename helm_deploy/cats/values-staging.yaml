# Staging overrides.
# NOTE: confirm the staging namespace / hostname before first deploy.
dotnetEnvironment: Staging

app:
  replicaCount: 3
  ingress:
    host: cfocats-staging.live.cloud-platform.service.justice.gov.uk
  env:
    DOTNET_ENVIRONMENT: "Staging"
    Sentry__Environment: "Staging-CloudPlatform"

worker:
  replicaCount: 1
  env:
    DOTNET_ENVIRONMENT: "Staging"
    Sentry__Environment: "Staging-CloudPlatform"

generic-prometheus-alerts:
  alertSeverity: cfo-alerts-nonprod
