serviceAccountName: hmpps-cfo-case-assessment-tracking-system-prod

app:
  serviceAccountName: hmpps-cfo-case-assessment-tracking-system-prod
  autoscaling:
    enabled: true
    minReplicas: 4
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 70
    scaleUpStabilizationWindowSeconds: 60
  ingress:
    host: hmpps-cfo-case-assessment-tracking-system-prod.live.cloud-platform.service.justice.gov.uk
    className: modsec
    modsecurity_audit_enabled: true
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  env:
    DOTNET_ENVIRONMENT: "Production"
    Sentry__Environment: "Production-CloudPlatform"

worker:
  serviceAccountName: hmpps-cfo-case-assessment-tracking-system-prod
  replicaCount: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  env:
    DOTNET_ENVIRONMENT: "Production"
    Sentry__Environment: "Production-CloudPlatform"
    Features__PresenceHub__RelayUserPresenceNotifications: "false"

# RDS bridge - disabled in non-development environments
rdsPortForward:
  enabled: false

