serviceAccountName: hmpps-cfo-case-assessment-tracking-system-preprod

app:
  serviceAccountName: hmpps-cfo-case-assessment-tracking-system-preprod
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 75
    targetMemoryUtilizationPercentage: 75
    scaleUpStabilizationWindowSeconds: 60
  ingress:
    host: hmpps-cfo-case-assessment-tracking-system-preprod.live.cloud-platform.service.justice.gov.uk
    modsecurity_audit_enabled: true
  resources:
    requests:
      cpu: 350m
      memory: 1Gi
    limits:
      cpu: 1200m
      memory: 2Gi
  env:
    DOTNET_ENVIRONMENT: "PreProduction"
    Sentry__Environment: "PreProduction-CloudPlatform"
    # Fully-qualified in-cluster DNS (<service>.<namespace>.svc.cluster.local)
    # so this matches NO_PROXY and bypasses the egress-controls Envoy proxy.
    WorkerOptions__BaseUrl: "http://cats-worker.hmpps-cfo-case-assessment-tracking-system-preprod.svc.cluster.local:8080"

worker:
  serviceAccountName: hmpps-cfo-case-assessment-tracking-system-preprod
  replicaCount: 1
  resources:
    requests:
      cpu: 150m
      memory: 384Mi
    limits:
      cpu: 750m
      memory: 768Mi
  env:
    DOTNET_ENVIRONMENT: "PreProduction"
    Sentry__Environment: "PreProduction-CloudPlatform"
    Features__PresenceHub__RelayUserPresenceNotifications: "false"

# RDS bridge - disabled in non-development environments
rdsPortForward:
  enabled: false

# Redis bridge - disabled in non-development environments
redisPortForward:
  enabled: false

