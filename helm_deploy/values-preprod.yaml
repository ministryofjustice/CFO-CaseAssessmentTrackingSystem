serviceAccountName: hmpps-cfo-case-assessment-tracking-system-preprod

app:
  serviceAccountName: hmpps-cfo-case-assessment-tracking-system-preprod
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 75
    targetMemoryUtilizationPercentage: 75
    scaleUpStabilizationWindowSeconds: 60
  ingress:
    host: hmpps-cfo-case-assessment-tracking-system-preprod.live.cloud-platform.service.justice.gov.uk
    modsecurity_audit_enabled: true
  env:
    DOTNET_ENVIRONMENT: "PreProduction"
    Sentry__Environment: "PreProduction-CloudPlatform"

worker:
  serviceAccountName: hmpps-cfo-case-assessment-tracking-system-preprod
  replicaCount: 1
  env:
    DOTNET_ENVIRONMENT: "PreProduction"
    Sentry__Environment: "PreProduction-CloudPlatform"
    Features__PresenceHub__RelayUserPresenceNotifications: "false"

# RDS bridge - disabled in non-development environments
rdsPortForward:
  enabled: false

